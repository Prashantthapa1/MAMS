name: Test and deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm ci --prefix server
      - run: npm ci --prefix client
      - run: npm test
      - run: npm run build

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT: production
      RAILWAY_BACKEND_SERVICE: ${{ secrets.RAILWAY_BACKEND_SERVICE }}
      RAILWAY_FRONTEND_SERVICE: ${{ secrets.RAILWAY_FRONTEND_SERVICE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g @railway/cli
      - name: Deploy backend
        working-directory: server
        run: railway up --service "$RAILWAY_BACKEND_SERVICE" --detach
      - name: Run database migrations
        working-directory: server
        run: railway run --service "$RAILWAY_BACKEND_SERVICE" -- npm run db:migrate
      - name: Deploy frontend
        working-directory: client
        run: railway up --service "$RAILWAY_FRONTEND_SERVICE" --detach
