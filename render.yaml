services:
  - type: web
    name: mams-api
    runtime: node
    rootDir: server
    buildCommand: npm ci && npm run build
    startCommand: npm run db:migrate && npm run start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mams-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
  - type: static
    name: mams-web
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
databases:
  - name: mams-db
    databaseName: employee_management
    user: employee_management
